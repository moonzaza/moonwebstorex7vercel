<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonX7 Store | Mi Carrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="js/neon-effects.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            color: #e2e8f0;
            background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.14), transparent 24%),
                        linear-gradient(180deg, #03040d 0%, #090c16 100%);
        }
        .glass-card {
            background: rgba(10, 14, 28, 0.92);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.30);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.28);
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #38bdf8 100%);
            color: white;
            transition: all 0.25s ease;
            box-shadow: 0 12px 28px rgba(56, 189, 248, 0.18);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 18px 38px rgba(56, 189, 248, 0.28); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.18);
            transition: background 0.25s ease, transform 0.25s ease;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }
        input, select {
            width: 100%;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.88);
            color: #e2e8f0;
            padding: 14px 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input:focus, select:focus { border-color: #6366f1 !important; outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.16); }
    </style>
</head>
<body class="bg-black text-gray-200">

<nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-md border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-4 md:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-violet-500 via-blue-500 to-cyan-400 flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.24)]">
                    <span class="text-sm font-bold">🌙</span>
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-violet-500 via-blue-400 to-cyan-300 bg-clip-text text-transparent">MoonX7</span>
            </div>
            <button onclick="location.href='index.html'" class="text-zinc-400 hover:text-cyan-300 transition">← Seguir comprando</button>
        </div>
    </div>
</nav>

<main class="pt-24 pb-16 px-4 max-w-4xl mx-auto">
    <h1 class="text-3xl md:text-4xl font-bold mb-8 bg-gradient-to-r from-violet-500 via-blue-400 to-cyan-300 bg-clip-text text-transparent">🛒 Mi Carrito</h1>
    
    <div id="cartContainer" class="space-y-4 mb-8"></div>
    
    <div id="emptyCartMessage" class="glass-card p-12 text-center hidden">
        <span class="material-symbols-outlined text-6xl text-zinc-600 mb-4">shopping_cart</span>
        <p class="text-zinc-400 mb-4">Tu carrito está vacío</p>
        <button onclick="location.href='index.html'" class="btn-primary px-6 py-2 rounded-xl text-white">Explorar productos</button>
    </div>
    
    <div id="cartSummary" class="glass-card p-6 hidden">
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-zinc-800">
            <span class="text-zinc-400">Subtotal</span>
            <span id="subtotal" class="text-xl font-bold text-white">$0.00</span>
        </div>
        <div class="flex justify-between items-center mb-6">
            <span class="text-zinc-400">Envío</span>
            <span class="text-green-500 text-sm">Gratis</span>
        </div>
        <div class="flex justify-between items-center pt-4 border-t border-zinc-800">
            <span class="text-xl font-bold text-white">Total</span>
            <span id="total" class="text-2xl font-bold text-cyan-300">$0.00</span>
        </div>
        <button id="checkoutBtn" class="btn-primary w-full mt-6 py-3 rounded-xl text-white font-bold text-lg">Proceder al Registro →</button>
    </div>
</main>

<script>
    let cart = JSON.parse(localStorage.getItem('m7_cart') || '[]');
    
    function renderCart() {
        const container = document.getElementById('cartContainer');
        const emptyDiv = document.getElementById('emptyCartMessage');
        const summaryDiv = document.getElementById('cartSummary');
        
        if (cart.length === 0) {
            container.innerHTML = '';
            emptyDiv.classList.remove('hidden');
            summaryDiv.classList.add('hidden');
            return;
        }
        
        emptyDiv.classList.add('hidden');
        summaryDiv.classList.remove('hidden');
        
        let subtotal = 0;
        
        container.innerHTML = cart.map((item, index) => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            return `
                <div class="glass-card p-4 flex flex-wrap md:flex-nowrap gap-4 items-center">
                    <img src="${item.image || 'https://placehold.co/80x80/1a1a1a/ff571a'}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <h3 class="font-bold text-white">${item.name}</h3>
                        <p class="text-zinc-500 text-sm">${item.category || 'Software'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-cyan-300 font-bold">$${item.price}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-zinc-500 text-sm">Cant: ${item.quantity}</span>
                            <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-400 transition">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                        <p class="text-white text-sm mt-1">Subtotal: $${itemTotal.toFixed(2)}</p>
                    </div>
                </div>
            `;
        }).join('');
        
        document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('total').textContent = `$${subtotal.toFixed(2)}`;
    }
    
    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('m7_cart', JSON.stringify(cart));
        renderCart();
        updateNavbarBadge();
    }
    
    function updateNavbarBadge() {
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        // No hay badge en esta página, pero actualizamos para consistencia
    }
    
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (cart.length > 0) {
            location.href = 'checkout.html';
        }
    });
    
    renderCart();
</script>
</body>
</html>
